services:
  postgres:
    image: postgres:16
    container_name: edtech_postgres
    environment:
      POSTGRES_USER: edtech
      POSTGRES_PASSWORD: edtech
      POSTGRES_DB: edtech
    ports:
      - "5432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U edtech -d edtech"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: edtech_redis
    ports:
      - "6379:6379"
    volumes:
      - ./data/redis:/data
